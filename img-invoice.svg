  <text x="36" y="215" font-size="12" font-weight="700" fill="#111">James Carter</text>
  <text x="36" y="231" font-size="11" fill="#555">Phone: +1 415 555 0192</text>
  <text x="36" y="247" font-size="11" fill="#555">San Francisco, CA 94103</text>

  <!-- Dates right column -->
  <text x="340" y="210" font-size="11" fill="#888">Issue date:</text>
  <text x="524" y="210" font-size="11" font-weight="700" fill="#111" text-anchor="end">Apr 22, 2026</text>

  <text x="340" y="232" font-size="11" fill="#888">Due date:</text>
  <text x="524" y="232" font-size="11" font-weight="700" fill="#111" text-anchor="end">Apr 22, 2026</text>

  <text x="340" y="254" font-size="11" fill="#888">Reference:</text>
  <text x="524" y="254" font-size="11" font-weight="700" fill="#111" text-anchor="end">000042</text>

