  <text x="52" y="416" font-size="12" font-weight="700" fill="#111">iPhone 15 Pro 128GB</text>
  <text x="52" y="432" font-size="11" fill="#555">Condition: NEW</text>
  <text x="350" y="424" font-size="12" fill="#333" text-anchor="middle">1</text>
  <text x="425" y="424" font-size="12" fill="#333" text-anchor="middle">$999</text>
  <text x="516" y="424" font-size="12" font-weight="700" fill="#111" text-anchor="end">$999</text>

  <!-- Row divider 2 -->
