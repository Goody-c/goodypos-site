  <text x="350" y="462" font-size="12" fill="#333" text-anchor="middle">2</text>
  <text x="425" y="462" font-size="12" fill="#333" text-anchor="middle">$4</text>
  <text x="516" y="462" font-size="12" font-weight="700" fill="#111" text-anchor="end">$8</text>

