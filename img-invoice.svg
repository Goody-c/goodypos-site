<svg xmlns="http://www.w3.org/2000/svg" width="560" height="800" viewBox="0 0 560 800" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="card-shadow" x="-4%" y="-2%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Paper background -->
