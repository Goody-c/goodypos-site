  <text x="516" y="526" font-size="12" font-weight="700" fill="#111" text-anchor="end">$1,019</text>

  <text x="320" y="548" font-size="12" fill="#555">Tax (7.5%)</text>
  <text x="516" y="548" font-size="12" fill="#555" text-anchor="end">$76.43</text>

  <text x="320" y="570" font-size="12" font-weight="700" fill="#111">Amount paid:</text>
  <text x="516" y="570" font-size="12" font-weight="700" fill="#111" text-anchor="end">$1,019</text>

  <text x="320" y="592" font-size="12" font-weight="700" fill="#111">Outstanding balance:</text>
  <text x="516" y="592" font-size="12" font-weight="700" fill="#111" text-anchor="end">$0</text>

  <!-- Total bar -->
  <rect x="316" y="608" width="200" height="44" rx="6" fill="#e53e3e"/>
  <text x="336" y="635" font-size="14" font-weight="900" fill="white">Total:</text>
  <text x="508" y="635" font-size="16" font-weight="900" fill="white" text-anchor="end">$1,019</text>

  <!-- Issued by -->
  <text x="516" y="676" font-size="11" fill="#555" text-anchor="end">Issued by, signature:</text>

  <!-- Signature at bottom right -->
  <g transform="translate(424,684)" fill="none" stroke="#111" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8,32 C12,16 20,8 26,11 C32,14 30,28 24,30 C18,32 15,24 18,20 C24,14 32,16 38,20"/>
    <path d="M38,20 C43,22 46,26 45,32 C43,38 37,40 33,36"/>
    <path d="M22,44 C24,42 30,38 36,40 C42,42 45,47 41,51 C38,55 30,53 28,49"/>
    <path d="M14,48 C17,53 22,58 26,56"/>
  </g>

  <!-- Signature underline -->
  <line x1="380" y1="754" x2="516" y2="754" stroke="#ddd" stroke-width="1"/>

  <!-- Footer note -->
  <text x="280" y="782" font-size="9" fill="#bbb" text-anchor="middle">Generated by GoodyPOS · goodypos.com</text>
