  <text x="200" y="326" font-size="14" font-weight="900" fill="white">Apr 22, 2026</text>
  <text x="316" y="326" font-size="14" font-weight="900" fill="white">Apr 22, 2026</text>
  <text x="516" y="326" font-size="15" font-weight="900" fill="white" text-anchor="end">$1,019</text>

