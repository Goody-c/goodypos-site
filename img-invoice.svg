  <rect x="36" y="278" width="476" height="66" rx="4" fill="#e53e3e"/>
  <rect x="388" y="278" width="128" height="66" rx="0" fill="#3d3d3d"/>
  <rect x="504" y="278" width="8" height="66" rx="4" fill="#3d3d3d"/>

