  <!-- SIGNATURE / LOGO -->
  <g transform="translate(36,28)" fill="none" stroke="#111" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8,38 C12,20 20,10 28,14 C36,18 32,34 26,36 C20,38 16,30 20,26 C26,20 36,22 44,26"/>
    <path d="M44,26 C50,28 54,32 52,38 C50,44 44,46 40,42"/>
    <path d="M28,50 C30,48 36,44 42,46 C48,48 52,54 48,58 C44,62 36,60 34,56 C32,52 36,48 42,48 C50,48 56,54 58,60"/>
    <path d="M18,56 C22,62 28,68 32,66"/>
  </g>

  <!-- Store name -->
  <text x="36" y="118" font-size="18" font-weight="900" fill="#111">GoodyTech Store</text>
