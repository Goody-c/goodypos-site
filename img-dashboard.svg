<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4338ca"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <filter id="sh3"><feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/></filter>
    <linearGradient id="profitCard" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#064e3b"/><stop offset="100%" stop-color="#0f2a1e"/></linearGradient>
  </defs>

  <!-- Window -->
  <rect width="640" height="480" rx="16" fill="#0b0f1f" filter="url(#sh3)"/>
  <rect width="640" height="44" rx="16" fill="#060812"/>
  <rect y="30" width="640" height="14" fill="#060812"/>
  <!-- Traffic lights -->
