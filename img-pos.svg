<svg xmlns="http://www.w3.org/2000/svg" width="640" height="500" viewBox="0 0 640 500" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="scanGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="totalBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="sh2"><feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <!-- App window -->
  <rect width="640" height="500" rx="16" fill="#0b0f1f" filter="url(#sh2)"/>

  <!-- Title bar -->
  <rect width="640" height="44" rx="16" fill="#060812"/>
  <rect y="30" width="640" height="14" fill="#060812"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="22" r="6" fill="#febc2e"/>
  <circle cx="56" cy="22" r="6" fill="#28c840"/>
  <!-- App title -->
  <text x="320" y="27" font-size="12" font-weight="800" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="0.5">GoodyPOS</text>
  <!-- Mode badge -->
  <rect x="490" y="12" width="130" height="20" rx="10" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="555" y="26" font-size="9" font-weight="800" fill="#f87171" text-anchor="middle" letter-spacing="0.8">⚡ HIGH-VOLUME MODE</text>

  <!-- Left panel: products (0 to 390) -->
  <!-- Search bar -->
  <rect x="12" y="54" width="378" height="38" rx="10" fill="#131929" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="38" y="77" font-size="11" fill="rgba(255,255,255,0.35)">Search product name or scan barcode</text>
  <!-- Search icon -->
  <circle cx="26" cy="73" r="6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="30" y1="77" x2="33" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Cursor blink -->
  <rect x="158" y="67" width="1.5" height="13" fill="#818cf8" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanned item (highlighted) -->
  <rect x="12" y="100" width="378" height="62" rx="12" fill="#0d2217" stroke="#34d399" stroke-width="1.5"/>
  <!-- Scan line animation -->
  <rect x="12" y="131" width="378" height="1.5" fill="url(#scanGlow)" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" from="0,-30" to="0,30" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <!-- Barcode icon -->
  <g transform="translate(28,114)">
    <rect x="0" width="2" height="26" fill="#34d399"/>
    <rect x="4" width="1" height="26" fill="#34d399"/>
    <rect x="7" width="3" height="26" fill="#34d399"/>
    <rect x="12" width="1" height="26" fill="#34d399"/>
    <rect x="15" width="2" height="26" fill="#34d399"/>
    <rect x="19" width="1" height="26" fill="#34d399"/>
    <rect x="22" width="3" height="26" fill="#34d399"/>
    <rect x="27" width="1" height="26" fill="#34d399"/>
    <rect x="30" width="2" height="26" fill="#34d399"/>
  </g>
  <text x="78" y="121" font-size="13" font-weight="800" fill="white">Samsung Galaxy A35 5G</text>
  <text x="78" y="137" font-size="9.5" fill="#94a3b8">Barcode: 8901234567890 · QC: SGA35</text>
  <text x="78" y="153" font-size="9.5" font-weight="700" fill="#34d399">✓ Added from barcode scan</text>
  <text x="370" y="131" font-size="16" font-weight="900" fill="#34d399" text-anchor="end">$285</text>

  <!-- Product grid -->
  <!-- Product 1 -->
  <rect x="12" y="172" width="120" height="82" rx="12" fill="#131929" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="72" y="200" font-size="22" text-anchor="middle">📱</text>
  <text x="72" y="218" font-size="9" font-weight="700" fill="white" text-anchor="middle">iPhone 15 Pro</text>
  <text x="72" y="231" font-size="9" fill="#34d399" text-anchor="middle" font-weight="700">$999</text>
  <text x="72" y="244" font-size="8" fill="#64748b" text-anchor="middle">8 in stock</text>

  <!-- Product 2 -->
  <rect x="142" y="172" width="120" height="82" rx="12" fill="#131929" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="202" y="200" font-size="22" text-anchor="middle">🎧</text>
  <text x="202" y="218" font-size="9" font-weight="700" fill="white" text-anchor="middle">AirPods Pro 2</text>
  <text x="202" y="231" font-size="9" fill="#34d399" text-anchor="middle" font-weight="700">$249</text>
  <text x="202" y="244" font-size="8" fill="#64748b" text-anchor="middle">12 in stock</text>

  <!-- Product 3 -->
  <rect x="272" y="172" width="120" height="82" rx="12" fill="#131929" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="332" y="200" font-size="22" text-anchor="middle">⌚</text>
  <text x="332" y="218" font-size="9" font-weight="700" fill="white" text-anchor="middle">Apple Watch S9</text>
  <text x="332" y="231" font-size="9" fill="#34d399" text-anchor="middle" font-weight="700">$399</text>
  <text x="332" y="244" font-size="8" fill="#f59e0b" text-anchor="middle">2 left — Low!</text>

  <!-- Product 4 -->
  <rect x="12" y="264" width="120" height="82" rx="12" fill="#131929" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="72" y="292" font-size="22" text-anchor="middle">🧴</text>
  <text x="72" y="310" font-size="9" font-weight="700" fill="white" text-anchor="middle">Dove Body Wash</text>
  <text x="72" y="323" font-size="9" fill="#34d399" text-anchor="middle" font-weight="700">$3.50</text>
  <text x="72" y="336" font-size="8" fill="#64748b" text-anchor="middle">48 in stock</text>

  <!-- Product 5 -->
  <rect x="142" y="264" width="120" height="82" rx="12" fill="#131929" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="202" y="292" font-size="22" text-anchor="middle">🥤</text>
  <text x="202" y="310" font-size="9" font-weight="700" fill="white" text-anchor="middle">Coke 1.5L Bottle</text>
  <text x="202" y="323" font-size="9" fill="#34d399" text-anchor="middle" font-weight="700">$0.80</text>
  <text x="202" y="336" font-size="8" fill="#64748b" text-anchor="middle">120 in stock</text>

  <!-- Product 6 -->
  <rect x="272" y="264" width="120" height="82" rx="12" fill="#131929" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="332" y="292" font-size="22" text-anchor="middle">🍪</text>
  <text x="332" y="310" font-size="9" font-weight="700" fill="white" text-anchor="middle">Digestive 400g</text>
  <text x="332" y="323" font-size="9" fill="#34d399" text-anchor="middle" font-weight="700">$1.20</text>
  <text x="332" y="336" font-size="8" fill="#f59e0b" text-anchor="middle">3 left — Low!</text>

  <!-- Numpad -->
  <rect x="12" y="356" width="378" height="132" rx="12" fill="#131929" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="28" y="375" font-size="8" font-weight="800" fill="#475569" letter-spacing="1.2">NUMPAD</text>
  <g fill="#1e293b">
    <rect x="28" y="380" width="46" height="34" rx="8"/>
    <rect x="82" y="380" width="46" height="34" rx="8"/>
    <rect x="136" y="380" width="46" height="34" rx="8"/>
    <rect x="190" y="380" width="46" height="34" rx="8"/>
    <rect x="244" y="380" width="46" height="34" rx="8"/>
    <rect x="298" y="380" width="46" height="34" rx="8"/>
    <rect x="28" y="422" width="46" height="34" rx="8"/>
    <rect x="82" y="422" width="46" height="34" rx="8"/>
    <rect x="136" y="422" width="46" height="34" rx="8"/>
    <rect x="190" y="422" width="46" height="34" rx="8"/>
    <rect x="244" y="422" width="46" height="34" rx="8"/>
  </g>
  <rect x="298" y="422" width="46" height="34" rx="8" fill="rgba(239,68,68,0.15)"/>
  <text x="51" y="403" font-size="14" font-weight="800" fill="white" text-anchor="middle">1</text>
  <text x="105" y="403" font-size="14" font-weight="800" fill="white" text-anchor="middle">2</text>
  <text x="159" y="403" font-size="14" font-weight="800" fill="white" text-anchor="middle">3</text>
  <text x="213" y="403" font-size="14" font-weight="800" fill="white" text-anchor="middle">4</text>
  <text x="267" y="403" font-size="14" font-weight="800" fill="white" text-anchor="middle">5</text>
  <text x="321" y="403" font-size="14" font-weight="800" fill="white" text-anchor="middle">6</text>
  <text x="51" y="445" font-size="14" font-weight="800" fill="white" text-anchor="middle">7</text>
  <text x="105" y="445" font-size="14" font-weight="800" fill="white" text-anchor="middle">8</text>
  <text x="159" y="445" font-size="14" font-weight="800" fill="white" text-anchor="middle">9</text>
  <text x="213" y="445" font-size="14" font-weight="800" fill="white" text-anchor="middle">00</text>
  <text x="267" y="445" font-size="14" font-weight="800" fill="white" text-anchor="middle">0</text>
  <text x="321" y="445" font-size="14" font-weight="800" fill="#f87171" text-anchor="middle">⌫</text>

  <!-- Divider -->
  <line x1="400" y1="44" x2="400" y2="500" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Right panel: cart (400 to 640) -->
  <text x="416" y="76" font-size="10" font-weight="800" fill="#475569" letter-spacing="1.5">CART · 3 ITEMS</text>

  <!-- Cart item 1 -->
  <rect x="408" y="86" width="220" height="52" rx="10" fill="#131929"/>
  <text x="420" y="106" font-size="11" font-weight="700" fill="white">iPhone 15 Pro Max</text>
  <text x="420" y="122" font-size="9.5" fill="#475569">1× · New</text>
  <text x="620" y="110" font-size="13" font-weight="800" fill="white" text-anchor="end">$999</text>
  <rect x="600" y="124" width="22" height="12" rx="4" fill="rgba(239,68,68,0.15)"/>
  <text x="611" y="133" font-size="7.5" fill="#f87171" text-anchor="middle">✕</text>

  <!-- Cart item 2 (highlighted - just scanned) -->
  <rect x="408" y="146" width="220" height="52" rx="10" fill="#0d2217" stroke="#34d399" stroke-width="1"/>
  <text x="420" y="166" font-size="11" font-weight="700" fill="white">Samsung A35 5G</text>
  <text x="420" y="182" font-size="9.5" fill="#34d399">1× · Just scanned ✓</text>
  <text x="620" y="170" font-size="13" font-weight="800" fill="#34d399" text-anchor="end">$285</text>

  <!-- Cart item 3 -->
  <rect x="408" y="206" width="220" height="52" rx="10" fill="#131929"/>
  <text x="420" y="226" font-size="11" font-weight="700" fill="white">AirPods Pro 2</text>
  <text x="420" y="242" font-size="9.5" fill="#475569">2× · $249 each</text>
  <text x="620" y="230" font-size="13" font-weight="800" fill="white" text-anchor="end">$498</text>
  <rect x="600" y="244" width="22" height="12" rx="4" fill="rgba(239,68,68,0.15)"/>
  <text x="611" y="253" font-size="7.5" fill="#f87171" text-anchor="middle">✕</text>

  <!-- Subtotal line -->
  <line x1="408" y1="268" x2="628" y2="268" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="420" y="284" font-size="10.5" fill="#475569">Subtotal</text>
  <text x="620" y="284" font-size="10.5" fill="#94a3b8" text-anchor="end">$1,782</text>
  <text x="420" y="300" font-size="10.5" fill="#475569">Tax (7.5%)</text>
  <text x="620" y="300" font-size="10.5" fill="#94a3b8" text-anchor="end">$133.65</text>

  <!-- Total bar -->
  <rect x="408" y="312" width="220" height="52" rx="12" fill="url(#totalBtn)"/>
  <text x="420" y="343" font-size="12" font-weight="900" fill="rgba(255,255,255,0.8)">TOTAL</text>
  <text x="620" y="343" font-size="20" font-weight="900" fill="white" text-anchor="end">$1,782</text>

  <!-- Charge button -->
  <rect x="408" y="372" width="220" height="48" rx="12" fill="#34d399"/>
  <text x="518" y="402" font-size="13" font-weight="900" fill="#022c22" text-anchor="middle">CHARGE CUSTOMER →</text>

  <!-- Payment quick buttons -->
  <text x="416" y="438" font-size="9" font-weight="800" fill="#334155" letter-spacing="1">QUICK CASH</text>
  <rect x="408" y="444" width="66" height="28" rx="8" fill="#1e293b"/>
  <rect x="482" y="444" width="66" height="28" rx="8" fill="#1e293b"/>
  <rect x="556" y="444" width="72" height="28" rx="8" fill="#1e293b"/>
  <text x="441" y="462" font-size="10" font-weight="700" fill="white" text-anchor="middle">$100</text>
  <text x="515" y="462" font-size="10" font-weight="700" fill="white" text-anchor="middle">$500</text>
  <text x="592" y="462" font-size="10" font-weight="700" fill="white" text-anchor="middle">$1,000</text>

  <!-- Hold sale + discount -->
  <rect x="408" y="480" width="104" height="14" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="520" y="480" width="108" height="14" rx="4" fill="rgba(255,255,255,0.04)"/>
  <text x="460" y="491" font-size="8" fill="#334155" text-anchor="middle">⏸ Hold Sale</text>
  <text x="574" y="491" font-size="8" fill="#334155" text-anchor="middle">🏷 Apply Discount</text>
</svg>
